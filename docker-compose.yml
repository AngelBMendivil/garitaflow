version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: garitaflow_db
    environment:
      POSTGRES_DB: garitaflow
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports: ["5432:5432"]
    volumes:
      - garitaflow_pgdata:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/01_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U dev -d garitaflow"]
      interval: 5s; timeout: 5s; retries: 10
volumes:
  garitaflow_pgdata:
